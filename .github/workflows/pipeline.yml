name: API Monitor CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build-test-artifact:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Compile Test (Syntax Validation)
        run: |
          python -m compileall .

      - name: Generate API Logs
        run: |
          python api_collector.py

      - name: Upload Logs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: logs/


  deploy-monitor:

    needs: build-test-artifact
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Logs Artifact
        uses: actions/download-artifact@v4
        with:
          name: api-logs
          path: logs/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Monitoring Analysis
        run: |
          python monitor.py